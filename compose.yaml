services:
  cachenjoy:
    build: .
    container_name: cachenjoy
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.depends-on=hydra,sabnzbd
    environment:
      - ADDON_BASE_URL=${ADDON_BASE_URL}
      - FILES_SECRET_TOKEN=${FILES_SECRET_TOKEN}
      - INSTALL_SECRET_TOKEN=${INSTALL_SECRET_TOKEN:-}
      - PORT=4040
      # so the SABnzbd API key auto-detect can find sabnzbd.ini regardless
      # of where this got cloned to - PWD is whatever directory you ran
      # `docker compose up` from
      - PROJECT_DIR=${PWD}
    # bound to localhost so it's reachable by a reverse proxy running on
    # the host, without exposing plain HTTP straight to the internet.
    # if your reverse proxy is itself a container on web_network, it can
    # just reach this by container name instead and this mapping is
    # redundant but harmless.
    ports:
      - "127.0.0.1:4040:4040"
    volumes:
      # full read-only host mount, used by the folder browser and for
      # serving downloads - the actual folder is a setting, not a separate
      # mount, so changing it in the UI applies right away
      - /:/host-root:ro
      - cachenjoy-settings:/app/data
    networks:
      - web_network
    depends_on:
      - hydra
      - sabnzbd

  # separate cleanup container, no network port, no internet access, only
  # settings.json (read-only) drives what it does. kept apart from the
  # main service so a bug in the internet-facing side can't reach this
  # one's broader filesystem access
  cachenjoy-cleanup:
    build: .
    container_name: cachenjoy-cleanup
    command: ["node", "cleanup-worker.js"]
    restart: unless-stopped
    volumes:
      - /:/host-root-rw
      - cachenjoy-settings:/app/data:ro

  hydra:
    image: lscr.io/linuxserver/nzbhydra2:latest
    container_name: hydra
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./hydra/config:/config
    networks:
      - web_network

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    hostname: sabnzbd
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./sabnzbd/config:/config
      - ./sabnzbd/downloads:/downloads
    networks:
      - web_network

networks:
  web_network:

volumes:
  cachenjoy-settings:
